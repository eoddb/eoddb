<style>
:root {
  --bg: #0d1117;
  --surface: #161b25;

  --border: #252d3d;

}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  padding: 2rem 1.5rem;
  min-height: 100vh;
}

  max-width: 1100px;

  width: 100%;
  border-collapse: collapse;

  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  position: sticky;
  top: 0;
}

}

}

}

.section-label {
  max-width: 1100px;

}

.summary-wrap {
  max-width: 1100px;
  margin: 0 auto 2rem;
  border: 1px solid var(--border);
  border-radius: 10px;

}

  font-size: 0.82rem;
}

  color: var(--green);
}

  font-weight: 600;

.footnotes {
  max-width: 1100px;
  margin: 0 auto 2rem;
  font-size: 0.75rem;

  line-height: 1.8;
}

.footnotes p {
  margin-bottom: 2px;
}

.timestamp {
  max-width: 1100px;
  margin: 0 auto 1rem;
  font-size: 0.7rem;
  color: var(--text-muted);
}

#loading {
  max-width: 1100px;
  margin: 2rem auto;
  text-align: center;
  color: var(--text-muted);
}
</style>
</head>
<body>

<div class="page-header">
  <h1>Guide Before You Buy Honkai: Star Rail Oneiric Shards</h1>
  <div class="subtitle">All prices converted to USD equivalent for easy comparison</div>
</div>

<div id="loading">Loading price data...</div>
<div id="main-content" style="display:none">

  <div class="section-label">Price Comparison (USD Equivalent)</div>
  <div class="table-wrap">
    <table id="price-table">
      <thead><tr id="table-header"></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div class="section-label">Best Prices (USD)</div>
  <div class="summary-wrap">
    <table>
      <thead><tr id="summary-header"></tr></thead>
      <tbody><tr id="summary-body"></tr></tbody>
    </table>
  </div>

  <div class="footnotes" id="footnotes"></div>
  <div class="timestamp" id="timestamp"></div>
</div>

<script>
const ITEMS = [
  "Express Supply Pass", "Nameless Glory", "Nameless Medal",
  "60 Oneiric Shards", "300 Oneiric Shards", "980 Oneiric Shards",
  "1980 Oneiric Shards", "3280 Oneiric Shards", "6480 Oneiric Shards"
];

const ITEM_KEYS = ITEMS.map(i => i.toLowerCase().replace(/ /g, '_'));

const COUNTRY_DATA = [
  { label: "US", currency: "USD", prices: [4.99,9.99,19.99,0.99,4.99,14.99,29.99,49.99,99.99] },
  { label: "UK", currency: "GBP", prices: [4.99,9.99,19.99,0.99,4.99,14.99,29.99,49.99,99.99] },
  { label: "EU", currency: "EUR", prices: [5.99,9.99,20.99,0.99,5.99,17.99,34.99,59.99,99.99] },
  { label: "Japan", currency: "JPY", prices: [610,1220,2480,120,610,1840,3680,6100,12000] },
  { label: "Australia", currency: "AUD", prices: [7.99,14.99,29.99,1.99,7.99,22.99,49.99,79.99,149.99] },
  { label: "Canada", currency: "CAD", prices: [6.99,12.99,24.99,1.29,6.99,19.99,39.99,69.99,129.99] },
  { label: "Indonesia", currency: "IDR", prices: [79000,159000,329000,16000,79000,249000,479000,799000,1599000] },
  { label: "Korea", currency: "KRW", prices: [5900,12000,25000,1200,5900,19000,37000,65000,119000] },
  { label: "Malaysia", currency: "MYR", prices: [19.90,39.90,79.90,4.90,19.90,59.90,129.90,199.90,399.90] },
  { label: "Philippines", currency: "PHP", prices: [299,499,999,49,299,799,1790,2990,4990] },
  { label: "Singapore", currency: "SGD", prices: [6.98,14.98,29.98,1.48,6.98,21.98,42.98,73.98,149.98] }
];

const THIRD_PARTIES = [
  {
    label: "Third Party S ^",
    currency: "SGD",
    isThirdParty: true,
    prices: [null, null, null, 1.41, 6.63, 20.88, 40.83, 70.28, 142.48]
  },
  {
    label: "Third Party L ^",
    currency: "SGD",
    isThirdParty: true,
    prices: [6.98, null, null, 1.48, 6.98, 21.98, 42.98, 73.98, 149.98]
  }
];

let rows = [];
let sortCol = -1;
let sortAsc = true;

async function init() {
  try {
    const resp = await fetch('exr_p2w.json');
    const exr = await resp.json();
    const rates = exr.rates;

    const allEntries = [...COUNTRY_DATA, ...THIRD_PARTIES];
    rows = allEntries.map(entry => {
      const rate = rates[entry.currency] || 1;
      const usdPrices = entry.prices.map(p => p === null ? null : +(p / rate).toFixed(2));
      return {
        label: entry.label,
        isThirdParty: entry.isThirdParty || false,
        usdPrices
      };
    });

    buildHeader();
    renderTable();
    buildSummary();
    buildFootnotes(exr);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
  } catch (e) {
    document.getElementById('loading').textContent = 'Error loading data: ' + e.message;
  }
}

function buildHeader() {
  const tr = document.getElementById('table-header');
  const th0 = document.createElement('th');
  th0.textContent = 'Country / Method';
  th0.innerHTML += '<span class="sort-arrow"></span>';
  th0.addEventListener('click', () => sortTable(0));
  tr.appendChild(th0);

  ITEMS.forEach((item, i) => {
    const th = document.createElement('th');
    th.textContent = item;
    th.innerHTML += '<span class="sort-arrow"></span>';
    th.addEventListener('click', () => sortTable(i + 1));
    tr.appendChild(th);
  });
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  const mins = new Array(ITEMS.length).fill(Infinity);
  rows.forEach(r => {
    r.usdPrices.forEach((p, i) => {
      if (p !== null && p < mins[i]) mins[i] = p;
    });
  });

  rows.forEach(r => {
    const tr = document.createElement('tr');
    if (r.isThirdParty) tr.classList.add('third-party');

    const tdLabel = document.createElement('td');
    tdLabel.textContent = r.label;
    tr.appendChild(tdLabel);

    r.usdPrices.forEach((p, i) => {
      const td = document.createElement('td');
      if (p === null) {
        td.textContent = '—';
        td.style.color = 'var(--text-muted)';
      } else {
        td.textContent = '$' + p.toFixed(2);
        if (p === mins[i]) td.classList.add('best-price');
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

function sortTable(colIdx) {
  const ths = document.querySelectorAll('#table-header th');
  if (sortCol === colIdx) {
    sortAsc = !sortAsc;
  } else {
    sortCol = colIdx;
    sortAsc = true;
  }

  ths.forEach(th => th.classList.remove('sorted-asc', 'sorted-desc'));
  ths[colIdx].classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');

  rows.sort((a, b) => {
    let va, vb;
    if (colIdx === 0) {
      va = a.label.toLowerCase();
      vb = b.label.toLowerCase();
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    va = a.usdPrices[colIdx - 1];
    vb = b.usdPrices[colIdx - 1];
    if (va === null) va = Infinity;
    if (vb === null) vb = Infinity;
    return sortAsc ? va - vb : vb - va;
  });

  renderTable();
}

function buildSummary() {
  const headerTr = document.getElementById('summary-header');
  const bodyTr = document.getElementById('summary-body');

  const th0 = document.createElement('th');
  th0.textContent = 'Best Price';
  th0.style.textAlign = 'left';
  headerTr.appendChild(th0);

  const td0 = document.createElement('td');
  td0.textContent = 'Lowest (USD)';
  td0.style.textAlign = 'left';
  td0.style.color = 'var(--header-text)';
  bodyTr.appendChild(td0);

  ITEMS.forEach((item, i) => {
    const th = document.createElement('th');
    th.textContent = item;
    headerTr.appendChild(th);

    let min = Infinity;
    let source = '';
    rows.forEach(r => {
      const p = r.usdPrices[i];
      if (p !== null && p < min) {
        min = p;
        source = r.label;
      }
    });

    const td = document.createElement('td');
    if (min === Infinity) {
      td.textContent = '—';
    } else {
      td.innerHTML = '$' + min.toFixed(2) + '<br><span style="font-size:0.65rem;color:var(--text-muted);font-weight:400">' + source + '</span>';
    }
    td.style.color = 'var(--green)';
    bodyTr.appendChild(td);
  });
}

function buildFootnotes(exr) {
  const fn = document.getElementById('footnotes');
  fn.innerHTML = [
    '* Turkey (TRY) — now priced in USD, identical to US pricing',
    '* New Zealand (NZD) — priced in USD, identical to US pricing',
    '* Vietnam (VND) — in-game store uses HKD pricing',
    '* Thailand (THB) — in-game store uses SGD pricing',
    '',
    '^ Third Party data based off Jul 2026'
  ].map(l => '<p>' + l + '</p>').join('');

  const ts = document.getElementById('timestamp');
  ts.textContent = 'Exchange rates last updated: ' + exr.updated_utc + ' (ECB reference date: ' + exr.ecb_reference_date + ')';
}

init();
</script>
</body>
</html>
