<style>

  .skill-name {

<div class="page-header">
  <h1>Honkai: Nexus Anima &mdash; All Nexus Anima by Aspect &amp; Type</h1>
  <span class="subtitle">Complete 3-star, 4-star &amp; 5-star Nexus Anima database with rarity breakdown and team-building reference. Data based on closed beta &mdash; will be updated if there are any changes.</span>
</div>

<div class="stat-row" id="stats"></div>

<div class="legend">
  <span style="color:var(--text-muted);">Rarity:</span>
  <span class="legend-item" data-rarity="5"><span class="legend-dot r5"></span> <span style="color:var(--r5)">5-Star</span></span>
  <span class="legend-item" data-rarity="4"><span class="legend-dot r4"></span> <span style="color:var(--r4)">4-Star</span></span>
  <span class="legend-item" data-rarity="3"><span class="legend-dot r3"></span> <span style="color:var(--r3)">3-Star</span></span>
</div>

<div class="tag-filters" id="tagFilters"></div>
<div class="tag-desc" id="tagDesc" hidden></div>

<div class="table-wrap">
  <table>
    <thead id="thead"></thead>
    <tbody id="grid"></tbody>
  </table>
</div>

<div class="analysis" id="analysis"></div>

<div class="disp-section" id="dispSection" hidden>
  <h2>Dispositions</h2>
  <p class="disp-note" id="dispNote"></p>
  <div class="disp-pair" id="dispPair"></div>
</div>

<div class="error-msg" id="error"></div>

<script>
const ASPECT_COLORS = {
  "Reality":"#5b9bd5","Beauty":"#e88abf","Change":"#6dd497","Competition":"#e07a5f",
  "Dark":"#7b6b9e","Hate":"#c44d4d","Insatiability":"#c97b3a","Joy":"#e6c84d",
  "Light":"#f0d78c","Love":"#e06b8f","Memory":"#6fa8c9","Oblivion":"#8a8a9e",
  "Pride":"#d4a035","Satiation":"#7ec98a","Strength":"#d47a5b","Ugliness":"#8b7a6b"
};

const ASPECT_ORDER = [
  "Light","Dark","Reality","Oblivion","Love","Hate",
  "Beauty","Ugliness","Joy","Pride","Strength","Competition",
  "Satiation","Insatiability","Change","Memory"
];

const TYPE_ORDER = ["Blaster","Mastermind","Explorer","Protector","Mascot"];

// Shown under the tag buttons when a tag is active
const TAG_DEFS = {
  "AoE": "Deals damage to multiple opponents in an area",
  "Burning": "Applies Burning, dealing True DMG based on Max Health per second",
  "Control": "Applies crowd control effects (Stun, Freeze, Imprison, Launch)",
  "Deep Wounds": "Reduces healing received by the target",
  "Energy Jam": "Increases the Energy cost of the opponent's next Skill",
  "Healing": "Restores Health to self or allies",
  "Pierce": "Attacks that penetrate through enemies or apply Armor/MR Shred",
  "Shield": "Grants a protective barrier that absorbs damage",
  "Support": "Buffs allied units (Attack SPD, ATK, MP)",
  "Taunt": "Forces nearby opponents to target this unit",
  "Terminate": "Targets or deals bonus damage to low-Health opponents"
};

const TAG_NOTE = "Tags can be subjective and should act merely as a quick filter. " +
  "(R1 — represents that the unit gains this tag at a particular additional copy)";

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function pct(n, total) {
  return (n / total * 100).toFixed(1) + '%';
}

async function loadJSON(filename) {
  const resp = await fetch('/hna/' + filename);
  if (!resp.ok) throw new Error('Failed to load ' + filename);
  return resp.json();
}

async function init() {
  let units, typesData, skillTagData;
  try {
    [units, typesData, skillTagData] = await Promise.all([
      loadJSON('eoddb_hna_nexus_anima_units.json'),
      loadJSON('eoddb_hna_types.json'),
      loadJSON('eoddb_hna_nexus_anima_skill_tag.json')
    ]);
  } catch (e) {
    showError('Could not load data files.');
    return;
  }

  // Tags come straight from the skill sheet's "EODdb Tags" column
  // ("AoE, Control (R2)"), so a new Nexus Anima picks up its filters with no
  // extra file to maintain.
  const tagsData = skillTagData.map(t => ({
    Name: t.Name,
    Tags: String(t['EODdb Tags'] || '').split(',').map(s => s.trim()).filter(Boolean)
      .map(part => {
        const m = part.match(/^(.*?)\s*\(R(\d+)\)$/);
        const tag = (m ? m[1] : part).replace(/\*+$/, '').trim();
        return m ? { tag, rank: Number(m[2]) } : { tag };
      })
  }));

  const tagMap = {};
  tagsData.forEach(t => { tagMap[t.Name] = t.Tags || []; });

  const allTypes = typesData.map(t => t.Type);
  const orderedTypes = TYPE_ORDER.filter(t => allTypes.includes(t));
  const extraTypes = allTypes.filter(t => !TYPE_ORDER.includes(t));
  const types = [...orderedTypes, ...extraTypes];

  const aspectSet = [...new Set(units.map(u => u.Aspect).filter(Boolean))];
  const orderedAspects = ASPECT_ORDER.filter(a => aspectSet.includes(a));
  const extraAspects = aspectSet.filter(a => !ASPECT_ORDER.includes(a));
  const aspects = [...orderedAspects, ...extraAspects];

  const total = units.length;
  const r3 = units.filter(u => u.Rarity === 3);
  const r4 = units.filter(u => u.Rarity === 4);
  const r5 = units.filter(u => u.Rarity === 5);

  // ── Stat boxes ──
  const statsEl = document.getElementById('stats');
  const boxes = [
    { num: total, label: 'Total Nexus Anima', color: 'var(--header-text)', rarity: 'all' },
    { num: r5.length, label: '5-Star Nexus Anima', color: 'var(--r5)', p: pct(r5.length, total), rarity: '5' },
    { num: r4.length, label: '4-Star Nexus Anima', color: 'var(--r4)', p: pct(r4.length, total), rarity: '4' },
    { num: r3.length, label: '3-Star Nexus Anima', color: 'var(--r3)', p: pct(r3.length, total), rarity: '3' },
    { num: aspects.length, label: 'Aspect Types', color: 'var(--accent1)' },
  ];
  boxes.forEach(b => {
    const div = document.createElement('div');
    div.className = 'stat-box';
    if (b.rarity) {
      div.classList.add('clickable');
      div.dataset.rarity = b.rarity;
    }
    div.innerHTML =
      `<div class="num" style="color:${b.color}">${b.num}</div>` +
      (b.p ? `<div class="pct" style="color:${b.color};opacity:0.7">${b.p}</div>` : '') +
      `<div class="label">${b.label}</div>`;
    statsEl.appendChild(div);
  });

  // ── Table header ──
  const typeMap = {};
  typesData.forEach(t => { typeMap[t.Type] = t.Description; });

  const thead = document.getElementById('thead');
  thead.classList.add('expandable');
  const headRow = document.createElement('tr');
  headRow.innerHTML = '<th style="color:#8b95a5;text-transform:none">EODdb.com</th>' + types.map(t => `<th>${t}</th>`).join('');
  thead.appendChild(headRow);

  // ── Type description row (hidden by default) ──
  const descRow = document.createElement('tr');
  descRow.className = 'type-desc-row';
  const labelTd = document.createElement('td');
  labelTd.textContent = 'Info';
  descRow.appendChild(labelTd);
  types.forEach(type => {
    const td = document.createElement('td');
    const count = units.filter(u => u.Type === type).length;
    const desc = typeMap[type] || '';
    const boldDesc = desc.replace(/^(\S+)/, '<strong>$1</strong>');
    td.innerHTML = `<span class="type-desc-count">${count} Nexus Anima</span>${boldDesc}`;
    descRow.appendChild(td);
  });
  thead.appendChild(descRow);

  headRow.addEventListener('click', () => {
    descRow.classList.toggle('visible');
    thead.classList.toggle('expanded');
  });

  // ── Build grid ──
  const grid = {};
  aspects.forEach(a => { grid[a] = {}; types.forEach(t => { grid[a][t] = []; }); });
  units.forEach(u => {
    if (u.Aspect && u.Type && grid[u.Aspect] && grid[u.Aspect][u.Type]) {
      grid[u.Aspect][u.Type].push({ name: u.Name, rarity: u.Rarity });
    }
  });
  Object.values(grid).forEach(row =>
    Object.values(row).forEach(arr => arr.sort((a, b) => b.rarity - a.rarity))
  );

  const tbody = document.getElementById('grid');
  const skillRows = {};
  aspects.forEach(aspect => {
    const tr = document.createElement('tr');
    const acColor = ASPECT_COLORS[aspect] || 'var(--border)';
    tr.style.setProperty('--aspect-color', acColor);

    const th = document.createElement('td');
    th.style.setProperty('--aspect-color', acColor);
    th.textContent = aspect;
    tr.appendChild(th);

    types.forEach(type => {
      const td = document.createElement('td');
      const cell = grid[aspect][type];
      if (!cell || cell.length === 0) {
        td.innerHTML = '<span class="empty-cell">—</span>';
      } else {
        if (cell.length > 2) td.classList.add('multi-col');
        cell.forEach(u => {
          const imgName = u.name.toLowerCase().replace(/[ .']/g, '');
          const unitTags = tagMap[u.name] || [];
          const span = document.createElement('span');
          span.className = 'unit r' + u.rarity;
          span.dataset.unitName = u.name;
          span.dataset.tags = unitTags.map(t => t.tag).join(',');
          span.dataset.tagsRaw = JSON.stringify(unitTags);
          const img = new Image();
          img.src = '/hna/img/nexusanima/' + imgName + '.webp';
          img.alt = u.name;
          img.onload = () => {
            span.classList.add('has-img');
            span.innerHTML = '';
            span.appendChild(img);
            const tip = document.createElement('span');
            tip.className = 'unit-tip';
            tip.textContent = u.name;
            span.appendChild(tip);
            const tagLabel = document.createElement('span');
            tagLabel.className = 'tag-label';
            span.appendChild(tagLabel);
          };
          img.onerror = () => {
            span.textContent = u.name;
            const tagLabel = document.createElement('span');
            tagLabel.className = 'tag-label';
            span.appendChild(tagLabel);
          };
          td.appendChild(span);
        });
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);

    // Empty row that skill/rapport detail blocks get dropped into on click
    const skillTr = document.createElement('tr');
    skillTr.className = 'skill-row';
    skillTr.style.setProperty('--aspect-color', acColor);
    const skillTd = document.createElement('td');
    skillTd.colSpan = types.length + 1;
    skillTd.innerHTML = '<div class="skill-inner"></div>';
    skillTr.appendChild(skillTd);
    tbody.appendChild(skillTr);
    skillRows[aspect] = { row: skillTr, inner: skillTd.firstElementChild };
  });

  function ac(name) {
    const c = ASPECT_COLORS[name] || 'var(--header-text)';
    return `<strong style="color:${c}">${name}</strong>`;
  }
  function acList(names) { return names.map(n => ac(n)).join(', '); }

  // ── Analysis ──
  const typeCounts = {};
  types.forEach(t => { typeCounts[t] = units.filter(u => u.Type === t).length; });
  const sortedTypes = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);
  const topType = sortedTypes[0];
  const bottomType = sortedTypes[sortedTypes.length - 1];

  const aspectCounts = {};
  aspects.forEach(a => { aspectCounts[a] = units.filter(u => u.Aspect === a).length; });
  const sortedAspects = Object.entries(aspectCounts).sort((a, b) => b[1] - a[1]);
  const topAspects = sortedAspects.slice(0, 2);
  const bottomVal = sortedAspects[sortedAspects.length - 1][1];
  const bottomAspects = sortedAspects.filter(a => a[1] === bottomVal);

  const r5Types = {};
  types.forEach(t => { r5Types[t] = r5.filter(u => u.Type === t).length; });
  const r5Sorted = Object.entries(r5Types).sort((a, b) => b[1] - a[1]);

  const r5Aspects = {};
  aspects.forEach(a => { r5Aspects[a] = r5.filter(u => u.Aspect === a).length; });
  const noR5 = aspects.filter(a => r5Aspects[a] === 0);

  let emptyCells = 0;
  aspects.forEach(a => types.forEach(t => { if (!grid[a][t] || grid[a][t].length === 0) emptyCells++; }));
  const totalCells = aspects.length * types.length;
  const coverage = ((totalCells - emptyCells) / totalCells * 100).toFixed(1);
  const avgPerAspect = (total / aspects.length).toFixed(1);

  const analysisEl = document.getElementById('analysis');
  analysisEl.innerHTML = `
    <h2>Statistical Summary</h2>
    <p>
      Across <strong>${total} Nexus Anima</strong> spanning <strong>${aspects.length} aspects</strong> and <strong>${types.length} types</strong>,
      the roster skews toward mid-rarity: <span class="hl-r4">4-star Nexus Anima</span> make up the largest share at <strong>${r4.length} (${pct(r4.length, total)})</strong>,
      followed by <span class="hl-r3">3-star Nexus Anima</span> at <strong>${r3.length} (${pct(r3.length, total)})</strong>,
      with <span class="hl-r5">5-star Nexus Anima</span> being the most exclusive at <strong>${r5.length} (${pct(r5.length, total)})</strong>.
      On average each aspect contains <strong>${avgPerAspect} Nexus Anima</strong>.
    </p>
    <p>
      <strong>Type distribution</strong> is uneven — <strong>${topType[0]}</strong> leads with <strong>${topType[1]} Nexus Anima</strong>,
      while <strong>${bottomType[0]}</strong> trails at just <strong>${bottomType[1]}</strong>.
      Among 5-star Nexus Anima specifically, <strong>${r5Sorted[0][0]}</strong> dominates with <strong>${r5Sorted[0][1]}</strong>,
      and <strong>${r5Sorted[r5Sorted.length - 1][0]}</strong> is the rarest 5-star type with only <strong>${r5Sorted[r5Sorted.length - 1][1]}</strong>.
      ${noR5.length > 0
        ? `Notably, ${acList(noR5)} ${noR5.length === 1 ? 'has' : 'have'} no 5-star representation at all — a gap that may indicate upcoming releases.`
        : 'Every aspect has at least one 5-star Nexus Anima.'}
    </p>
    <p>
      <strong>Aspect density</strong> ranges from ${ac(topAspects[0][0])} and ${ac(topAspects[1][0])} (${topAspects[0][1]} Nexus Anima each, the most populated)
      down to ${acList(bottomAspects.map(a => a[0]))} with just <strong>${bottomVal}</strong> each.
      Grid coverage sits at <strong>${coverage}%</strong> — <strong>${emptyCells}</strong> of ${totalCells} aspect×type slots are currently empty,
      representing potential niches for future Nexus Anima additions. The pairing of aspects into thematic opposites
      (${ac('Light')}/${ac('Dark')}, ${ac('Love')}/${ac('Hate')}, ${ac('Reality')}/${ac('Oblivion')}) is reflected in the roster, though coverage within each pair is not always symmetric.
    </p>
  `;

  // ── Rarity filter ──
  const tableWrap = document.querySelector('.table-wrap');
  const legendItems = document.querySelectorAll('.legend-item');
  const statBoxes = document.querySelectorAll('.stat-box.clickable');

  function clearFilter() {
    tableWrap.classList.remove('filter-r3', 'filter-r4', 'filter-r5');
    legendItems.forEach(li => li.classList.remove('active'));
    statBoxes.forEach(sb => sb.classList.remove('active-r3', 'active-r4', 'active-r5'));
  }

  function applyFilter(rarity) {
    if (rarity === 'all') { clearFilter(); return; }
    const filterClass = 'filter-r' + rarity;
    if (tableWrap.classList.contains(filterClass)) {
      clearFilter();
    } else {
      clearFilter();
      tableWrap.classList.add(filterClass);
      legendItems.forEach(li => { if (li.dataset.rarity === rarity) li.classList.add('active'); });
      statBoxes.forEach(sb => { if (sb.dataset.rarity === rarity) sb.classList.add('active-r' + rarity); });
    }
  }

  legendItems.forEach(item => {
    item.addEventListener('click', () => applyFilter(item.dataset.rarity));
  });
  statBoxes.forEach(box => {
    box.addEventListener('click', () => applyFilter(box.dataset.rarity));
  });

  // ── Tag filters ──
  const allTags = [];
  tagsData.forEach(t => {
    (t.Tags || []).forEach(entry => {
      if (!allTags.includes(entry.tag)) allTags.push(entry.tag);
    });
  });
  allTags.sort();

  const tagFiltersEl = document.getElementById('tagFilters');
  const tagLabel = document.createElement('span');
  tagLabel.style.cssText = 'color:var(--text-muted);';
  tagLabel.textContent = 'Tags:';
  tagFiltersEl.appendChild(tagLabel);

  const undoBtn = document.createElement('button');
  undoBtn.className = 'tag-btn undo';
  undoBtn.textContent = 'Undo Filter';
  tagFiltersEl.appendChild(undoBtn);

  const activeTags = new Set();
  const tagBtns = [];

  allTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = tag;
    btn.dataset.tag = tag;
    tagFiltersEl.appendChild(btn);
    tagBtns.push(btn);

    btn.addEventListener('click', () => {
      if (activeTags.has(tag)) {
        activeTags.delete(tag);
        btn.classList.remove('active');
      } else {
        activeTags.add(tag);
        btn.classList.add('active');
      }
      applyTagFilter();
    });
  });

  undoBtn.addEventListener('click', () => {
    activeTags.clear();
    tagBtns.forEach(b => b.classList.remove('active'));
    applyTagFilter();
  });

  const tagDescEl = document.getElementById('tagDesc');

  function renderTagDesc() {
    if (activeTags.size === 0) { tagDescEl.hidden = true; tagDescEl.innerHTML = ''; return; }
    const items = allTags.filter(t => activeTags.has(t)).map(tag => {
      const matches = tagsData.filter(t => (t.Tags || []).some(e => e.tag === tag)).length;
      return `<div class="tag-desc-item"><span class="tag-desc-name">${tag}</span> — ` +
             `${TAG_DEFS[tag] || 'No description yet.'} ` +
             `<span class="tag-desc-count">(${matches} Nexus Anima)</span></div>`;
    });
    tagDescEl.innerHTML = items.join('') + `<div class="tag-desc-note">${TAG_NOTE}</div>`;
    tagDescEl.hidden = false;
  }

  function applyTagFilter() {
    renderTagDesc();
    const allUnits = tableWrap.querySelectorAll('.unit');
    if (activeTags.size === 0) {
      tableWrap.classList.remove('tag-filtering');
      allUnits.forEach(u => {
        u.classList.remove('tag-hidden');
        const lbl = u.querySelector('.tag-label');
        if (lbl) lbl.textContent = '';
      });
      return;
    }
    tableWrap.classList.add('tag-filtering');
    allUnits.forEach(u => {
      const unitTagsStr = u.dataset.tags || '';
      const unitTagNames = unitTagsStr ? unitTagsStr.split(',') : [];
      const hasAll = [...activeTags].every(t => unitTagNames.includes(t));
      u.classList.toggle('tag-hidden', !hasAll);

      const lbl = u.querySelector('.tag-label');
      if (lbl) {
        if (hasAll) {
          const rawTags = JSON.parse(u.dataset.tagsRaw || '[]');
          const annotations = [];
          rawTags.forEach(entry => {
            if (activeTags.has(entry.tag) && entry.rank !== undefined) {
              annotations.push(entry.tag + ' R' + entry.rank);
            }
          });
          lbl.textContent = annotations.join(', ');
        } else {
          lbl.textContent = '';
        }
      }
    });
  }

  // ── Skill / Rapport detail on portrait click ──
  buildSkillDetails(units, skillTagData, skillRows);

  // ── Dispositions ──
  buildDispositions(units, types);
}

// Clicking a portrait in the grid opens that unit's skill and rapport ranks in
// a detail row under its aspect. Blocks are built on first open.
async function buildSkillDetails(units, skillTagData, skillRows) {
  let rapportData, eidosData;
  try {
    [rapportData, eidosData] = await Promise.all([
      loadJSON('eoddb_hna_nexus_anima_skill_rapport.json'),
      loadJSON('eoddb_hna_eidos.json')
    ]);
  } catch (e) {
    return;   // grid stays usable without the skill data
  }

  const unitBy = {};
  units.forEach(u => { unitBy[u.Name] = u; });

  const skillBy = {};
  skillTagData.forEach(s => { skillBy[s.Name] = s; });

  const rapportBy = {};
  rapportData.forEach(r => { rapportBy[r.Name] = r; });

  // Eidos list their companion, so invert it to look up by Nexus Anima
  const companionOf = {};
  eidosData.forEach(e => { if (e.Companion) companionOf[e.Companion] = e.Name; });

  const esc = s => String(s).replace(/[&<>"]/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  function buildBlock(name) {
    const u = unitBy[name] || {};
    const skill = skillBy[name] || {};
    const rapport = rapportBy[name] || {};
    const block = document.createElement('div');
    block.className = 'skill-block';
    block.dataset.unitName = name;

    const chips = [
      u.Aspect ? `<span class="chip">Aspect <strong>${esc(u.Aspect)}</strong></span>` : '',
      u.Type ? `<span class="chip">Type <strong>${esc(u.Type)}</strong></span>` : '',
      companionOf[name] ? `<span class="chip">Eidos Companion <strong>${esc(companionOf[name])}</strong></span>` : '',
      skill['Ability Tags'] ? `<span class="chip">In-game Tags <strong>${esc(skill['Ability Tags'])}</strong></span>` : '',
      skill['EODdb Tags'] ? `<span class="chip">EODdb Tags <strong>${esc(skill['EODdb Tags'])}</strong></span>` : ''
    ].join('');

    const ranks = [];
    if (rapport['Ability Description']) {
      ranks.push(`<div class="rank-item base"><span class="rank-label">Base</span>` +
                 `<span>${esc(rapport['Ability Description'])}</span></div>`);
    }
    for (let i = 1; i <= 6; i++) {
      const text = rapport['Rank ' + i];
      if (!text) continue;
      ranks.push(`<div class="rank-item"><span class="rank-label">Rank ${i}</span>` +
                 `<span>${esc(text)}</span></div>`);
    }

    const slug = name.toLowerCase().replace(/[ .']/g, '');
    block.innerHTML =
      `<div class="skill-head r${u.Rarity}">` +
        `<img src="/hna/img/nexusanima/${slug}.webp" alt="${esc(name)}" onerror="this.style.display='none'">` +
        `<span class="skill-unit-name">${esc(name)}</span>` +
        (u.Rarity ? `<span class="rarity-tag r${u.Rarity}">${u.Rarity}-Star</span>` : '') +
      `</div>` +
      `<div class="skill-meta">${chips}</div>` +
      (skill['Ability Name'] ? `<div class="skill-name">${esc(skill['Ability Name'])}</div>` : '') +
      (ranks.length ? `<div class="rank-list">${ranks.join('')}</div>`
                    : `<div class="rank-item">No skill data recorded yet.</div>`);
    return block;
  }

  document.querySelectorAll('#grid .unit').forEach(span => {
    const name = span.dataset.unitName;
    const aspect = (unitBy[name] || {}).Aspect;
    const target = skillRows[aspect];
    if (!name || !target) return;

    span.addEventListener('click', () => {
      let block = target.inner.querySelector(`.skill-block[data-unit-name="${CSS.escape(name)}"]`);
      if (!block) {
        block = buildBlock(name);
        target.inner.appendChild(block);
      }
      const opening = !block.classList.contains('show-block');
      block.classList.toggle('show-block', opening);
      span.classList.toggle('active-unit', opening);
      target.row.classList.toggle('visible',
        target.inner.querySelectorAll('.skill-block.show-block').length > 0);
    });
  });
}

// Builds the Disposition reference tables. Runs after the main grid so a
// missing/failed JSON leaves the rest of the page intact.
async function buildDispositions(units, types) {
  let dispData, mapData;
  try {
    [dispData, mapData] = await Promise.all([
      loadJSON('eoddb_hna_dispositions.json'),
      loadJSON('eoddb_hna_disposition_nexusanima.json')
    ]);
  } catch (e) {
    return;
  }

  const unitInfo = {};
  units.forEach(u => { unitInfo[u.Name] = { type: u.Type, rarity: u.Rarity }; });

  // Sheet names carry the captured tier ("Timid III"); the mapping sheet uses
  // bare names, so split the numeral off and join on the bare name.
  const baseName = s => String(s).replace(/\s+(I{1,3})$/, '').trim();

  const effects = {};
  dispData.forEach(d => { effects[baseName(d.Disposition)] = d.Effect || ''; });

  const holders = {};
  Object.keys(effects).forEach(n => { holders[n] = []; });
  mapData.forEach(row => {
    [1, 2, 3, 4].forEach(i => {
      const d = row['Disposition ' + i];
      if (d && holders[d]) holders[d].push(row.Name);
    });
  });

  const list = Object.keys(effects).map(name => ({
    name,
    effect: effects[name],
    units: holders[name]
  }));

  let sortAsc = true;   // rarest first
  const pair = document.getElementById('dispPair');
  const section = document.getElementById('dispSection');
  const totalHolders = list.reduce((sum, d) => sum + d.units.length, 0);

  document.getElementById('dispNote').innerHTML =
    `Every Nexus Anima has <strong>4 dispositions</strong>. Click a row to see which Nexus Anima carry it. ` +
    `<strong>${list.length} dispositions</strong> across <strong>${totalHolders} slots</strong>.`;

  function render() {
    const sorted = list.slice().sort((a, b) =>
      (sortAsc ? a.units.length - b.units.length : b.units.length - a.units.length)
      || a.name.localeCompare(b.name));
    const half = Math.ceil(sorted.length / 2);
    pair.innerHTML = '';
    [sorted.slice(0, half), sorted.slice(half)].forEach(chunk => {
      pair.appendChild(buildTable(chunk));
    });
  }

  function buildTable(chunk) {
    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    const table = document.createElement('table');

    const thead = document.createElement('thead');
    const arrow = sortAsc ? '▲' : '▼';
    thead.innerHTML =
      '<tr><th>Disposition</th><th>Description</th>' +
      `<th class="sortable disp-qty">Qty<span class="sort-arrow">${arrow}</span></th></tr>`;
    thead.querySelector('.sortable').addEventListener('click', () => {
      sortAsc = !sortAsc;
      render();
    });
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    chunk.forEach(d => {
      const tr = document.createElement('tr');
      tr.className = 'disp-row';

      const nameTd = document.createElement('td');
      const slug = d.name.toLowerCase().replace(/[ .']/g, '');
      nameTd.innerHTML =
        `<span class="disp-name"><span class="caret">▶</span>` +
        `<img src="/hna/img/dispositions/${slug}.webp?v=1" alt="${d.name}" ` +
        `onerror="this.style.display='none'">` +
        `<span>${d.name}</span></span>`;
      tr.appendChild(nameTd);

      const effTd = document.createElement('td');
      effTd.className = 'disp-effect';
      effTd.textContent = d.effect;
      tr.appendChild(effTd);

      const qtyTd = document.createElement('td');
      qtyTd.className = 'disp-qty';
      qtyTd.textContent = d.units.length;
      tr.appendChild(qtyTd);

      const detail = document.createElement('tr');
      detail.className = 'disp-detail';
      detail.hidden = true;
      const detailTd = document.createElement('td');
      detailTd.colSpan = 3;
      detail.appendChild(detailTd);

      // Portraits are built on first expand — building all 27 panels up front
      // would fire 328 image requests on page load.
      let built = false;
      tr.addEventListener('click', () => {
        if (!built) { detailTd.appendChild(unitPanel(d.units)); built = true; }
        detail.hidden = !detail.hidden;
        tr.classList.toggle('open', !detail.hidden);
        tr.querySelector('.caret').textContent = detail.hidden ? '▶' : '▼';
      });

      tbody.appendChild(tr);
      tbody.appendChild(detail);
    });

    table.appendChild(tbody);
    wrap.appendChild(table);
    return wrap;
  }

  // Portraits grouped by Type, reusing the grid's .unit styling.
  function unitPanel(names) {
    const frag = document.createDocumentFragment();
    types.forEach(type => {
      const inType = names
        .filter(n => unitInfo[n] && unitInfo[n].type === type)
        .sort((a, b) => unitInfo[b].rarity - unitInfo[a].rarity || a.localeCompare(b));
      if (!inType.length) return;

      const group = document.createElement('div');
      group.className = 'type-group';
      const label = document.createElement('div');
      label.className = 'type-label';
      label.textContent = `${type} (${inType.length})`;
      group.appendChild(label);

      inType.forEach(name => {
        const info = unitInfo[name];
        const span = document.createElement('span');
        span.className = 'unit r' + info.rarity;
        const img = new Image();
        img.src = '/hna/img/nexusanima/' + name.toLowerCase().replace(/[ .']/g, '') + '.webp';
        img.alt = name;
        img.onload = () => {
          span.classList.add('has-img');
          span.innerHTML = '';
          span.appendChild(img);
          const tip = document.createElement('span');
          tip.className = 'unit-tip';
          tip.textContent = name;
          span.appendChild(tip);
        };
        img.onerror = () => { span.textContent = name; };
        group.appendChild(span);
      });
      frag.appendChild(group);
    });
    return frag;
  }

  section.hidden = false;
  render();
}

init();
</script>
<script src="/eoddb_footer.js" defer></script>
</body>
