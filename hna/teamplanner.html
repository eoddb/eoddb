<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Honkai: Nexus Anima Team Comp Planner | EODdb.com</title>
<meta property="og:title" content="Honkai: Nexus Anima Team Comp Planner | EODdb.com">
<meta name="twitter:title" content="Honkai: Nexus Anima Team Comp Planner | EODdb.com">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b25;
    --surface-hover: #1c2233;
    --border: #252d3d;
    --text: #c9d1d9;
    --text-muted: #6e7a8a;
    --r5: #dfc86a;
    --header-bg: #111821;
    --header-text: #e6edf3;
    --accent1: #6366f1;
    --hex-size: 64px;
    --hex-gap: 4px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 2rem 1.5rem;
    min-height: 100vh;
  }

  .page-header {
    max-width: 1000px;
    margin: 0 auto 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .page-header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--header-text);
  }

  .page-header .subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .planner-wrap {
    max-width: 1100px;
    margin: 0 auto;
  }

  .unit-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 1rem;
  }

  .unit-count strong {
    color: var(--r5);
  }

  /* ── Main layout: grid + synergy side by side ── */
  .planner-main {
    display: flex;
    flex-direction: row-reverse;
    gap: 16px;
    margin-bottom: 1rem;
    align-items: flex-start;
  }

  /* ── Hex Grid ── */
  .hex-grid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .hex-row {
    display: flex;
    gap: var(--hex-gap);
  }

  .hex-row.offset {
    margin-left: calc(var(--hex-size) / 2 + var(--hex-gap) / 2 + 2px);
  }

  .hex-cell {
    width: var(--hex-size);
    height: var(--hex-size);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: var(--header-bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    position: relative;
  }

  .hex-cell:hover { background: var(--surface-hover); }
  .hex-cell.selected { background: var(--accent1); }
  .hex-cell.occupied { background: transparent; }

  .hex-cell-inner {
    width: calc(var(--hex-size) - 6px);
    height: calc(var(--hex-size) - 6px);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: var(--header-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hex-cell.selected .hex-cell-inner { background: rgba(99, 102, 241, 0.3); }
  .hex-cell.occupied .hex-cell-inner { background: transparent; }

  .hex-cell img {
    width: calc(var(--hex-size) - 12px);
    height: calc(var(--hex-size) - 12px);
    object-fit: cover;
    border-radius: 50%;
  }


  .hex-cell .hex-border {
    position: absolute;
    inset: 0;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: var(--border);
    z-index: -1;
  }

  .hex-cell.occupied .hex-border { background: rgba(201, 209, 217, 0.4); }
  .hex-cell.selected .hex-border { background: var(--accent1); }

  .hex-label {
    font-size: 0.55rem;
    color: var(--text-muted);
    opacity: 0.5;
    pointer-events: none;
  }

  .hex-cell.occupied .hex-label { display: none; }

  .hex-watermark {
    font-size: 0.65rem;
    color: rgba(201, 209, 217, 0.15);
    letter-spacing: 0.12em;
    font-weight: 700;
    text-align: center;
    user-select: none;
    pointer-events: none;
    margin: -2px 0 2px;
  }

  .hex-row-label {
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    pointer-events: none;
    padding: 0 10%;
    margin-bottom: 2px;
  }

  .hex-row-label .line {
    flex: 1;
    border-top: 1px dashed rgba(201, 209, 217, 0.15);
  }

  .hex-row-label .label-text {
    font-size: 0.6rem;
    color: rgba(201, 209, 217, 0.15);
    letter-spacing: 0.1em;
    font-weight: 700;
    white-space: nowrap;
  }

  .hex-cell.hex-glow .hex-border {
    transition: background 0.3s;
  }

  /* ── Synergy Panel ── */
  .synergy-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    min-width: 0;
  }

  .eidos-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }

  .eidos-box-title {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .eidos-slots {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .eidos-slot {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .eidos-slot:hover {
    border-color: var(--text-muted);
  }

  .eidos-slot.occupied {
    border-style: solid;
    border-color: var(--accent1);
  }

  .eidos-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .filter-btn.eidos-1 { outline: 2px solid #e8dfa0; outline-offset: 1px; }
  .filter-btn.eidos-2 { outline: 2px solid #e8b87a; outline-offset: 1px; }
  .filter-btn.eidos-3 { outline: 2px solid #d98a8a; outline-offset: 1px; }

  .synergy-title {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .synergy-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .synergy-row {
    display: none;
    align-items: flex-start;
    gap: 8px;
    padding: 4px 4px;
    border-bottom: 1px solid var(--border);
  }

  .synergy-row:last-child { border-bottom: none; }

  .synergy-row.active {
    display: flex;
  }

  .synergy-icon {
    width: 120px;
    min-width: 120px;
    flex-shrink: 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .synergy-icon img {
    height: 28px;
    width: auto;
    max-width: 120px;
    display: block;
  }

  .synergy-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
    justify-content: center;
    min-height: 28px;
    height: 28px;
  }

  .synergy-dots {
    display: flex;
    gap: 3px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .syn-dot {
    border-radius: 40%;
    border: 1.5px solid var(--text-muted);
    background: transparent;
    transition: background 0.2s, border-color 0.2s;
  }

  .syn-dot.big {
    width: 14px;
    height: 9px;
  }

  .syn-dot.small {
    width: 10px;
    height: 6px;
  }

  .syn-dot.filled {
    background: rgba(201, 209, 217, 0.35);
    border-color: rgba(201, 209, 217, 0.5);
  }

  .syn-dot.threshold-met {
    background: var(--r5);
    border-color: var(--r5);
  }

  .synergy-desc {
    display: none;
  }

  .hex-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    margin-top: 6px;
    padding: 0 4px;
  }

  .hex-legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.6rem;
    color: var(--text-muted);
  }

  .hex-legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .synergy-empty {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-style: italic;
    padding: 8px 0;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 1rem;
  }

  .ctrl-btn {
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.8rem;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .ctrl-btn:hover {
    border-color: var(--text-muted);
    background: var(--surface-hover);
  }

  .ctrl-btn.danger:hover {
    border-color: #c44d4d;
    color: #f87171;
  }

  /* ── Roster ── */
  .roster-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .roster-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
  }

  .roster-tab {
    flex: 1;
    padding: 6px 0;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }

  .roster-tab:hover {
    color: var(--text);
    border-color: var(--text-muted);
  }

  .roster-tab.active {
    color: var(--header-text);
    border-color: var(--accent1);
    background: var(--accent1-dim);
  }

  .roster-title {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .roster {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }

  .roster-label {
    width: 100%;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin: 10px 0 4px;
    text-align: center;
  }

  .roster-label:first-child { margin-top: 0; }

  .roster-unit {
    position: relative;
    width: 48px;
    height: 48px;
    border-radius: 8px;
    border: 2px solid;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }

  .roster-unit.r5 { border-color: var(--r5); }
  .roster-unit.r4 { border-color: var(--r4); }
  .roster-unit.r3 { border-color: var(--r3); }

  .roster-unit:hover {
    transform: scale(1.1);
    z-index: 2;
  }

  .roster-unit img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .companion-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: #d98a8a;
    pointer-events: none;
    z-index: 3;
  }

  .hex-cell .companion-bar {
    bottom: 8%;
    left: 15%;
    right: 15%;
    height: 4px;
    border-radius: 1px;
  }

  .roster-unit.placed {
    opacity: 0.25;
    cursor: default;
  }

  .roster-unit.placed:hover { transform: none; }

  .roster-unit .roster-tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 0.6rem;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
    color: var(--text);
  }

  .roster-unit:hover .roster-tip { display: block; }

  .roster-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    font-size: 0.75rem;
    margin-bottom: 6px;
  }

  .roster-filters .filter-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    min-width: 42px;
  }

  .filter-btn {
    padding: 3px 9px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
    color: var(--text-muted);
    background: transparent;
    font-size: 0.7rem;
    font-family: inherit;
  }

  .filter-btn:hover {
    background: var(--surface-hover);
    border-color: var(--text-muted);
  }

  .filter-btn.active {
    background: var(--surface);
    border-color: var(--accent1);
    color: var(--header-text);
  }

  .filter-btn.undo {
    color: var(--text-muted);
    border-color: var(--border);
  }

  .filter-btn.undo:hover {
    border-color: var(--text-muted);
  }

  .roster-unit.filter-hidden {
    opacity: 0.12;
    pointer-events: none;
  }

  @media (max-width: 640px) {
    :root { --hex-size: 40px; }
    .planner-main { flex-direction: column; }
    .synergy-panel { min-width: 0; }
    .roster-unit { width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<script src="/hna/eoddb_hna_nav.js"></script>
<div class="page-header">
  <h1>Honkai: Nexus Anima Team Comp Planner</h1>
  <span class="subtitle">Visualize your dream team and share it with friends. Click a Nexus Anima and click on any Hex Grid to begin.</span>
</div>

<div class="planner-wrap">
  <div class="unit-count" id="unitCount">Units: <strong>0</strong> / 8</div>

  <div class="planner-main">
    <div style="flex:2;min-width:0;display:flex;flex-direction:column;">
      <div class="hex-grid" id="hexGrid"></div>
      <div class="hex-legend" id="hexLegend"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;flex:1;min-width:0;">
      <div class="synergy-panel">
        <div class="synergy-title">Synergies</div>
        <div class="synergy-list" id="synergyList"></div>
      </div>
      <div class="eidos-box">
        <div class="eidos-box-title">Eidos</div>
        <div class="eidos-slots" id="eidosSlots">
          <div class="eidos-slot" data-slot="0"></div>
          <div class="eidos-slot" data-slot="1"></div>
          <div class="eidos-slot" data-slot="2"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn danger" id="clearBtn">Clear All</button>
  </div>

  <div class="roster-section">
    <div class="roster-tabs">
      <button class="roster-tab active" id="tabNA">Nexus Anima</button>
      <button class="roster-tab" id="tabEidos">Eidos</button>
    </div>
    <div class="roster-panel" id="panelNA">
      <div class="roster-filters" id="typeFilters"></div>
      <div class="roster-filters" id="aspectFilters"></div>
      <div class="roster" id="roster"></div>
    </div>
    <div class="roster-panel" id="panelEidos" style="display:none;">
      <div class="roster-filters" id="eidosAspectFilters"></div>
      <div class="roster" id="eidosRoster"></div>
    </div>
  </div>
</div>

<script>
let UNITS = [];
let EIDOS = [];
const UNIT_MAP = {};
const EIDOS_MAP = {};
const ASPECT_THRESHOLDS = {};
const ASPECT_MAX = {};
let activeTab = 'na';

const HEX_INTERACTIONS = [
  {aspect:"Strength", units:1, hexes:["1D"], color:"#e8e0a0", desc:"Hex applies Dominator"},
  {aspect:"Dark", units:3, hexes:["1A","1D","1G","4A","4G"], color:"#7a8bc4", desc:"Hex applies ASPD buff"},
  {aspect:"Dark", units:6, hexes:["1A","1B","1C","1D","1E","1F","1G","4A","4D","4G"], color:"#7a8bc4", desc:"Hex applies ASPD buff"}
];

function parseHexId(id) {
  const row = parseInt(id[0]) - 1;
  const col = id.charCodeAt(1) - 65;
  return [row, col];
}

const ROWS = [
  {cols: 7, offset: false},
  {cols: 7, offset: true},
  {cols: 7, offset: false},
  {cols: 7, offset: true}
];

const COL_LETTERS = 'ABCDEFG';
const MAX_UNITS = 8;

function imgName(name) {
  return name.toLowerCase().replace(/[ .']/g, '');
}

function imgSrc(name) {
  return '/hna/img/nexusanima/' + imgName(name) + '.webp';
}

function eidosImgSrc(name) {
  return '/hna/img/eidos/' + imgName(name) + '.webp';
}

const grid = [];
let selectedCell = null;
let selectedRosterUnit = null;
const placedUnits = new Set();
const synergyRows = {};

const hexGridEl = document.getElementById('hexGrid');
const hexLegendEl = document.getElementById('hexLegend');
const rosterEl = document.getElementById('roster');
const unitCountEl = document.getElementById('unitCount');
const synergyListEl = document.getElementById('synergyList');

// Frontline label above row 1
const frontlineLabel = document.createElement('div');
frontlineLabel.className = 'hex-row-label';
frontlineLabel.innerHTML = '<div class="line"></div><span class="label-text">Frontline</span><div class="line"></div>';
hexGridEl.appendChild(frontlineLabel);

// Build hex grid
ROWS.forEach((rowDef, ri) => {
  const rowEl = document.createElement('div');
  rowEl.className = 'hex-row' + (rowDef.offset ? ' offset' : '');
  const rowCells = [];

  for (let ci = 0; ci < rowDef.cols; ci++) {
    const cell = document.createElement('div');
    cell.className = 'hex-cell';

    const border = document.createElement('div');
    border.className = 'hex-border';
    cell.appendChild(border);

    const inner = document.createElement('div');
    inner.className = 'hex-cell-inner';

    const label = document.createElement('span');
    label.className = 'hex-label';
    label.textContent = (ri + 1) + COL_LETTERS[ci];
    inner.appendChild(label);

    cell.appendChild(inner);
    cell.addEventListener('click', () => onCellClick(ri, ci));
    rowEl.appendChild(cell);
    rowCells.push({el: cell, inner: inner, unit: null, label: (ri + 1) + COL_LETTERS[ci]});
  }

  grid.push(rowCells);
  hexGridEl.appendChild(rowEl);

  if (ri === 1) {
    const wm = document.createElement('div');
    wm.className = 'hex-watermark';
    wm.textContent = 'EODdb.com';
    hexGridEl.appendChild(wm);
  }
});

// Load data from JSON then build UI
Promise.all([
  fetch('/hna/eoddb_hna_nexus_anima_units.json').then(r => r.json()),
  fetch('/hna/eoddb_hna_aspects.json').then(r => r.json()),
  fetch('/hna/eoddb_hna_eidos.json').then(r => r.json())
]).then(([unitsData, aspectsData, eidosData]) => {

UNITS = unitsData.map(u => ({name: u.Name, aspect: u.Aspect, type: u.Type, rarity: u.Rarity}));
UNITS.forEach(u => { UNIT_MAP[u.name] = u; });

EIDOS = eidosData.map(e => ({name: e.Name, aspect: e.Aspect, rarity: e.Rarity, companion: e.Companion}));
EIDOS.forEach(e => { EIDOS_MAP[e.name] = e; });

let currentAspect = null;
aspectsData.forEach(row => {
  if (row.Aspect) currentAspect = row.Aspect;
  if (!currentAspect) return;
  if (!ASPECT_THRESHOLDS[currentAspect]) ASPECT_THRESHOLDS[currentAspect] = [];
  ASPECT_THRESHOLDS[currentAspect].push(row['Units Required']);
});
Object.keys(ASPECT_THRESHOLDS).forEach(a => {
  ASPECT_MAX[a] = Math.max(...ASPECT_THRESHOLDS[a]);
});

// Build synergy rows
Object.keys(ASPECT_THRESHOLDS).forEach(aspect => {
  const row = document.createElement('div');
  row.className = 'synergy-row';

  const icon = document.createElement('div');
  icon.className = 'synergy-icon';
  const img = document.createElement('img');
  img.src = '/hna/img/aspects/' + aspect.toLowerCase() + '.webp';
  img.alt = aspect;
  icon.appendChild(img);

  const dots = document.createElement('div');
  dots.className = 'synergy-dots';

  const maxDots = ASPECT_MAX[aspect];
  const thresholds = ASPECT_THRESHOLDS[aspect];
  for (let i = 1; i <= maxDots; i++) {
    const dot = document.createElement('span');
    const isBig = thresholds.includes(i);
    dot.className = 'syn-dot ' + (isBig ? 'big' : 'small');
    dot.dataset.index = i;
    dots.appendChild(dot);
  }

  const descEl = document.createElement('div');
  descEl.className = 'synergy-desc';

  const right = document.createElement('div');
  right.className = 'synergy-right';
  right.appendChild(dots);
  right.appendChild(descEl);

  row.appendChild(icon);
  row.appendChild(right);

  synergyListEl.appendChild(row);
  synergyRows[aspect] = {el: row, dots: dots, desc: descEl};
});

// Build roster grouped by rarity
[5, 4, 3].forEach(rarity => {
  const label = document.createElement('div');
  label.className = 'roster-label';
  label.textContent = rarity + '-Star';
  label.style.color = 'var(--r' + rarity + ')';
  rosterEl.appendChild(label);

  UNITS.filter(u => u.rarity === rarity).forEach(u => {
    const div = document.createElement('div');
    div.className = 'roster-unit r' + rarity;
    div.dataset.name = u.name;

    const img = document.createElement('img');
    img.src = imgSrc(u.name);
    img.alt = u.name;
    div.appendChild(img);

    const tip = document.createElement('span');
    tip.className = 'roster-tip';
    tip.textContent = u.name;
    div.appendChild(tip);

    div.addEventListener('click', () => onRosterClick(u.name, div));
    rosterEl.appendChild(div);
  });
});

// Build roster filters
const TYPES = ["Blaster","Mastermind","Explorer","Protector","Mascot"];
const ASPECTS_LIST = Object.keys(ASPECT_THRESHOLDS);
const activeTypes = new Set();
const activeAspects = new Set();

function unitMatchesFilter(u) {
  const hasType = activeTypes.size > 0;
  const hasAspect = activeAspects.size > 0;
  if (!hasType && !hasAspect) return true;
  if (hasType && hasAspect) return activeTypes.has(u.type) && activeAspects.has(u.aspect);
  if (hasType) return activeTypes.has(u.type);
  return activeAspects.has(u.aspect);
}

function applyRosterFilter() {
  const filtering = activeTypes.size > 0 || activeAspects.size > 0;
  document.querySelectorAll('.roster-unit').forEach(el => {
    const u = UNIT_MAP[el.dataset.name];
    if (!u) return;
    el.classList.toggle('filter-hidden', !unitMatchesFilter(u));
  });
  grid.forEach(row => {
    row.forEach(cell => {
      if (!cell.unit) return;
      const u = UNIT_MAP[cell.unit];
      if (!u) return;
      if (filtering && !unitMatchesFilter(u)) {
        cell.el.style.opacity = '0.4';
      } else {
        cell.el.style.opacity = '';
      }
    });
  });
}

function buildFilterRow(container, items, activeSet, labelText, isEidos) {
  const lbl = document.createElement('span');
  lbl.className = 'filter-label';
  lbl.textContent = labelText;
  container.appendChild(lbl);

  const undoBtn = document.createElement('span');
  undoBtn.className = 'filter-btn undo';
  undoBtn.textContent = 'Undo';
  undoBtn.addEventListener('click', () => {
    activeSet.clear();
    container.querySelectorAll('.filter-btn:not(.undo)').forEach(b => b.classList.remove('active'));
    if (isEidos) applyEidosFilter(); else applyRosterFilter();
  });
  container.appendChild(undoBtn);

  items.forEach(item => {
    const btn = document.createElement('span');
    btn.className = 'filter-btn';
    btn.textContent = item;
    btn.addEventListener('click', () => {
      if (activeSet.has(item)) {
        activeSet.delete(item);
        btn.classList.remove('active');
      } else {
        activeSet.add(item);
        btn.classList.add('active');
      }
      if (isEidos) applyEidosFilter(); else applyRosterFilter();
    });
    container.appendChild(btn);
  });
}

buildFilterRow(document.getElementById('typeFilters'), TYPES, activeTypes, 'Type');
buildFilterRow(document.getElementById('aspectFilters'), ASPECTS_LIST, activeAspects, 'Aspect');

// Build eidos roster
const eidosRosterEl = document.getElementById('eidosRoster');
[5, 4].forEach(rarity => {
  const eidosOfRarity = EIDOS.filter(e => e.rarity === rarity);
  if (!eidosOfRarity.length) return;

  label.textContent = rarity + '-Star';
  label.style.color = 'var(--r' + rarity + ')';
  eidosRosterEl.appendChild(label);

  eidosOfRarity.forEach(e => {
    const div = document.createElement('div');
    div.className = 'roster-unit eidos-roster-unit r' + e.rarity;
    div.dataset.name = e.name;
    div.dataset.companion = e.companion;

    const img = document.createElement('img');
    img.src = eidosImgSrc(e.name);
    img.alt = e.name;
    div.appendChild(img);

    const tip = document.createElement('span');
    tip.className = 'roster-tip';
    tip.textContent = e.name;

    div.addEventListener('click', () => onEidosRosterClick(e.name, div));

// Eidos aspect filter
const eidosActiveAspects = new Set();
const eidosFilterContainer = document.getElementById('eidosAspectFilters');
eidosFilterContainer._activeSet = eidosActiveAspects;
buildFilterRow(eidosFilterContainer, ASPECTS_LIST, eidosActiveAspects, 'Aspect', true);

// Tab switching
document.getElementById('tabNA').addEventListener('click', () => {
  activeTab = 'na';
  document.getElementById('tabNA').classList.add('active');
  document.getElementById('tabEidos').classList.remove('active');
  document.getElementById('panelNA').style.display = '';
  document.getElementById('panelEidos').style.display = 'none';
  clearSelection();
});

document.getElementById('tabEidos').addEventListener('click', () => {
  activeTab = 'eidos';
  document.getElementById('tabEidos').classList.add('active');

// Eidos slot click listeners
document.querySelectorAll('.eidos-slot').forEach((slot, i) => {
  slot.addEventListener('click', () => onEidosSlotClick(i));
});

updateCount();
updateSynergies();

}); // end Promise.all

function updateCount() {
  unitCountEl.innerHTML = 'Units: <strong>' + placedUnits.size + '</strong> / ' + MAX_UNITS;
}

let selectedEidos = null;
const eidosSlots = [null, null, null];

function clearSelection() {
  if (selectedCell) {
    const c = grid[selectedCell[0]][selectedCell[1]];
    c.el.classList.remove('selected');
    selectedCell = null;
  }
  selectedRosterUnit = null;
  selectedEidos = null;
  document.querySelectorAll('.roster-unit.selected-roster').forEach(r => r.classList.remove('selected-roster'));
}

function onRosterClick(name, div) {
  if (placedUnits.has(name)) return;
  clearSelection();
  selectedRosterUnit = name;
  div.classList.add('selected-roster');
}

function onEidosRosterClick(name, div) {
  if (eidosSlots.includes(name)) return;
  clearSelection();
  selectedEidos = name;
  div.classList.add('selected-roster');
}

function applyEidosFilter() {
  const eidosActiveAspects = document.getElementById('eidosAspectFilters')._activeSet;
  const filtering = eidosActiveAspects && eidosActiveAspects.size > 0;
  document.querySelectorAll('.eidos-roster-unit').forEach(el => {
    const e = EIDOS_MAP[el.dataset.name];
    if (!e) return;
    el.classList.toggle('filter-hidden', filtering && !eidosActiveAspects.has(e.aspect));
  });
}

function onCellClick(ri, ci) {
  const cell = grid[ri][ci];

  if (selectedRosterUnit) {
    if (cell.unit) { clearSelection(); return; }
    if (placedUnits.size >= MAX_UNITS) { clearSelection(); return; }
    placeUnit(ri, ci, selectedRosterUnit);
    clearSelection();
    return;
  }

  if (selectedCell) {
    const [sr, sc] = selectedCell;
    if (sr === ri && sc === ci) {
      if (cell.unit) removeUnit(ri, ci);
      clearSelection();
      return;
    }
    const srcCell = grid[sr][sc];
    const srcUnit = srcCell.unit;
    const dstUnit = cell.unit;
    if (srcUnit && !dstUnit) {
      removeUnit(sr, sc);
      placeUnit(ri, ci, srcUnit);
    } else if (srcUnit && dstUnit) {
      removeUnit(sr, sc);
      removeUnit(ri, ci);
      placeUnit(ri, ci, srcUnit);
      placeUnit(sr, sc, dstUnit);
    }
    clearSelection();
    return;
  }

  if (cell.unit) {
    selectedCell = [ri, ci];
    cell.el.classList.add('selected');
  }
}

function onEidosSlotClick(slotIdx) {
  if (selectedEidos) {
    if (eidosSlots[slotIdx]) {
      clearSelection();
      return;
    }
    eidosSlots[slotIdx] = selectedEidos;
    renderEidosSlots();
    updateEidosRoster();
    updateAspectFilterOutlines();
    updateCompanionHearts();
    clearSelection();
    return;
  }
  if (eidosSlots[slotIdx]) {
    eidosSlots[slotIdx] = null;
    renderEidosSlots();
    updateEidosRoster();
    updateAspectFilterOutlines();
    updateCompanionHearts();
  }
}

function renderEidosSlots() {
  document.querySelectorAll('.eidos-slot').forEach((slot, i) => {
    slot.innerHTML = '';
    slot.classList.remove('occupied');
    if (eidosSlots[i]) {
      const e = EIDOS_MAP[eidosSlots[i]];
      const img = document.createElement('img');
      img.src = eidosImgSrc(eidosSlots[i]);
      img.alt = eidosSlots[i];
      slot.appendChild(img);
      slot.classList.add('occupied');
      if (e) slot.style.borderColor = '';
    }
  });
}

function placeUnit(ri, ci, name) {
  const cell = grid[ri][ci];
  cell.unit = name;
  cell.el.classList.add('occupied');

  const inner = cell.inner;
  inner.innerHTML = '';
  const img = document.createElement('img');
  img.src = imgSrc(name);
  img.alt = name;
  inner.appendChild(img);

  placedUnits.add(name);
  updateRoster();
  updateCount();
  updateSynergies();
  updateCompanionHearts();
}

function removeUnit(ri, ci) {
  const cell = grid[ri][ci];
  const name = cell.unit;
  cell.unit = null;
  cell.el.classList.remove('occupied');

  const inner = cell.inner;
  inner.innerHTML = '';
  const label = document.createElement('span');
  label.className = 'hex-label';
  label.textContent = cell.label;
  inner.appendChild(label);

  placedUnits.delete(name);
  updateRoster();
  updateCount();
  updateSynergies();
  updateCompanionHearts();
}

function updateRoster() {
  document.querySelectorAll('.roster-unit:not(.eidos-roster-unit)').forEach(div => {
    div.classList.toggle('placed', placedUnits.has(div.dataset.name));
  });
}

function updateEidosRoster() {
  document.querySelectorAll('.eidos-roster-unit').forEach(div => {
    div.classList.toggle('placed', eidosSlots.includes(div.dataset.name));
  });
}

function updateAspectFilterOutlines() {
  const aspectCounts = {};
  eidosSlots.forEach(name => {
    if (!name) return;
    const e = EIDOS_MAP[name];
    if (e) aspectCounts[e.aspect] = (aspectCounts[e.aspect] || 0) + 1;
  });
  document.querySelectorAll('#aspectFilters .filter-btn:not(.undo)').forEach(btn => {
    btn.classList.remove('eidos-1', 'eidos-2', 'eidos-3');
    const count = aspectCounts[btn.textContent] || 0;
    if (count >= 1 && count <= 3) btn.classList.add('eidos-' + count);
  });
}

function updateCompanionHearts() {
  const companions = new Set();
  eidosSlots.forEach(name => {
    if (!name) return;
    const e = EIDOS_MAP[name];
    if (e) companions.add(e.companion);
  });

  document.querySelectorAll('.roster-unit:not(.eidos-roster-unit)').forEach(div => {
    const existing = div.querySelector('.companion-bar');
    if (existing) existing.remove();
    if (companions.has(div.dataset.name)) {
      const heart = document.createElement('span');
      heart.className = 'companion-bar';
      div.appendChild(heart);
    }
  });

  grid.forEach(row => row.forEach(cell => {
    const existing = cell.el.querySelector('.companion-bar');
    if (existing) existing.remove();
    if (cell.unit && companions.has(cell.unit)) {
      const heart = document.createElement('span');
      heart.className = 'companion-bar';
      cell.el.appendChild(heart);
    }
  }));
}

function updateSynergies() {
  const aspectCounts = {};
  placedUnits.forEach(name => {
    const u = UNIT_MAP[name];
    if (u) {
      aspectCounts[u.aspect] = (aspectCounts[u.aspect] || 0) + 1;
    }
  });

  // Collect all hex colors per cell and legend items
  const hexColors = {};
  const legendItems = [];
  grid.forEach((row, ri) => row.forEach((cell, ci) => {
    hexColors[ri + '-' + ci] = [];
    cell.el.classList.remove('hex-glow');
    cell.el.querySelector('.hex-border').style.background = '';
  }));

  Object.keys(ASPECT_THRESHOLDS).forEach(aspect => {
    const sr = synergyRows[aspect];
    if (!sr) return;
    const count = aspectCounts[aspect] || 0;

    if (count > 0) {
      sr.el.classList.add('active');
    } else {
      sr.el.classList.remove('active');
      sr.dots.querySelectorAll('.syn-dot').forEach(d => {
        d.classList.remove('filled', 'threshold-met');
      });
      sr.desc.textContent = '';
      return;
    }

    const thresholds = ASPECT_THRESHOLDS[aspect];
    const highestMet = [...thresholds].reverse().find(t => count >= t);

    sr.dots.querySelectorAll('.syn-dot').forEach(dot => {
      const idx = parseInt(dot.dataset.index);
      dot.classList.remove('filled', 'threshold-met');
      if (idx <= count) {
        if (highestMet && thresholds.includes(idx) && idx <= highestMet) {
          dot.classList.add('threshold-met');
        } else {
          dot.classList.add('filled');
        }
      }
    });

    // Hex interactions — find the highest matching interaction for this aspect
    let activeHexes = [];
    let activeColor = '';
    let activeDesc = '';
    HEX_INTERACTIONS.filter(h => h.aspect === aspect).forEach(h => {
      if (count >= h.units) {
        activeHexes = h.hexes;
        activeColor = h.color;
        activeDesc = h.desc;
      }
    });

    if (activeHexes.length > 0) {
      legendItems.push({color: activeColor, desc: activeDesc});
      activeHexes.forEach(id => {
        const [r, c] = parseHexId(id);
        if (grid[r] && grid[r][c]) {
          const key = r + '-' + c;
          if (!hexColors[key].includes(activeColor)) {
            hexColors[key].push(activeColor);
          }
        }
      });
    }
  });

  // Apply hex colors — hard-split gradient for overlaps
  grid.forEach((row, ri) => row.forEach((cell, ci) => {
    const key = ri + '-' + ci;
    const colors = hexColors[key];
    const border = cell.el.querySelector('.hex-border');
    if (colors.length === 1) {
      cell.el.classList.add('hex-glow');
      border.style.background = colors[0];
    } else if (colors.length > 1) {
      cell.el.classList.add('hex-glow');
      const stops = colors.map((c, i) => {
        const pct1 = (i / colors.length * 100).toFixed(1);
        const pct2 = ((i + 1) / colors.length * 100).toFixed(1);
        return c + ' ' + pct1 + '%, ' + c + ' ' + pct2 + '%';
      }).join(', ');
      border.style.background = 'linear-gradient(135deg, ' + stops + ')';
    }
  }));

  // Build hex legend
  hexLegendEl.innerHTML = '';
  legendItems.forEach(item => {
    const el = document.createElement('div');
    el.className = 'hex-legend-item';
    el.innerHTML = '<span class="hex-legend-dot" style="background:' + item.color + '"></span>' + item.desc;
    hexLegendEl.appendChild(el);
  });
}

document.getElementById('clearBtn').addEventListener('click', () => {
  clearSelection();
  grid.forEach((row, ri) => {
    row.forEach((cell, ci) => {
      if (cell.unit) removeUnit(ri, ci);
    });
  });
  eidosSlots[0] = null; eidosSlots[1] = null; eidosSlots[2] = null;
  renderEidosSlots();
  updateEidosRoster();
  updateAspectFilterOutlines();
  updateCompanionHearts();
});

</script>
